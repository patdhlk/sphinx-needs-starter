name: Publish base image

# Builds and pushes the dev container base image
# (ghcr.io/patdhlk/sphinx-needs-starter) from .devcontainer/Dockerfile.
#
# Triggered when a GitHub Release is published (the release tag becomes the
# image version, e.g. release "v0.1.1" -> image tags 0.1.1, 0.1, latest), and
# manually via the Actions tab (workflow_dispatch -> pushes :latest).
on:
  release:
    types: [published]
  workflow_dispatch:

# Use the repo's GITHUB_TOKEN to push to its own GHCR package — no PAT needed.
permissions:
  contents: read
  packages: write

# GitHub forces JS actions onto Node.js 24 from 2026-06-16. Opt in early so the
# Node 20 deprecation warning is gone and the actions are exercised on Node 24.
# Harmless to keep once Node 24 is the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # QEMU lets us build the linux/arm64 layer on an amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # On a release tag: {{version}} -> 0.1.1, {{major}}.{{minor}} -> 0.1,
          # plus :latest (metadata-action's default latest=auto for semver tags).
          # On manual dispatch (no tag): push :latest only.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
